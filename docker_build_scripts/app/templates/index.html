<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{data["option_a"]["name"]}} vs {{data["option_b"]["name"]}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      #content-container-center {
        background: #1e293b;
        padding: 40px;
        border-radius: 16px;
        text-align: center;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      }

      h3 {
        margin-bottom: 20px;
        font-size: 2rem;
        color: #38bdf8;
      }

      p {
        margin-bottom: 30px;
        font-size: 1.1rem;
      }

      #choice {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        padding: 15px 30px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button:hover {
        transform: scale(1.05);
      }

      .a {
        background: #f43f5e;
        color: white;
      }

      .b {
        background: #22c55e;
        color: white;
      }

      .opcion-personalizada {
        width: 100%;
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .opcion-personalizada input {
        width: 70%;
        max-width: 380px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 1rem;
      }

      #tip {
        margin-top: 20px;
        font-size: 0.9rem;
        opacity: 0.7;
      }

      #hostname {
        margin-top: 25px;
        font-size: 0.8rem;
        opacity: 0.5;
      }
    </style>
  </head>

  <body>
    <div id="content-container-center">

      <h3>{{data["option_a"]["name"]}} vs {{data["option_b"]["name"]}}</h3>

      <p>
        {{data["option_a"]["name"]}} tiene {{data["option_a"]["total"]}} votos,
        y {{data["option_b"]["name"]}} tiene {{data["option_b"]["total"]}} votos.
      </p>

      <form id="choice" method="POST" action="/">

        <button type="submit" name="vote" class="a" value="{{data['option_a']['name']}}">
          {{data["option_a"]["name"]}}
        </button>

        <button type="submit" name="vote" class="b" value="{{data['option_b']['name']}}">
          {{data["option_b"]["name"]}}
        </button>

        <div class="opcion-personalizada">
          <input 
            type="text" 
            name="custom_vote" 
            placeholder="Escribe tu opción..."
          >

          <button type="submit" name="vote" value="custom">
            Votar opción personalizada
          </button>
        </div>

      </form>

      <div id="tip">
        (Puedes cambiar tu voto)
      </div>

      <div id="hostname">
        Procesado por el contenedor {{hostname}}
      </div>

    </div>
  </body>
</html>
