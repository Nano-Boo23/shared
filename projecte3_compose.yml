services:
  proxy:
    image: gserraa/main:proxy
    ports:
      - "8080:80"

  web1:
    image: gserraa/main:web1

  web2:
    image: gserraa/main:web2

  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: db_proj3
    volumes:
      #might change this later to push/get to/from github
      #- db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  #test service
  adminer:
    image: adminer
    ports:
      - 8090:8080

volumes:
  db_data:
